<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylex.css">
</head>
<body class="loading">



	<main>
		<div id="slider">

			<div class="slider-inner">
				<div id="slider-content">
					<div class="meta">Project</div>
					<h2 id="slide-title">Edge <br>Tower</h2>
					<span data-slide-title="0">Edge <br>Tower</span>
					<span data-slide-title="1">TRG <br>Aqua Bar</span>
					<span data-slide-title="2">TTG <br>Living</span>
					<div class="meta">Developer</div>
					<div id="slide-status">Tribica Group</div>
					<span data-slide-status="0">Tribica Group</span>
					<span data-slide-status="1">Tribica Group</span>
					<span data-slide-status="2">Tribica Group</span>
				</div>
			</div>

			<!-- Background images -->
			<img src="./Edge_Tower.jpg.jpeg" />
			<img src="./TRG_AquaBar.jpg" />
			<img src="./TTG_Living.jpg.jpeg" />

			<div id="pagination">
				<button class="active" data-slide="0"></button>
				<button data-slide="1"></button>
				<button data-slide="2"></button>
			</div>

		</div>
	</main>
    <!-- Three.js + loaders from jsDelivr (matching version 0.128.0) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.imagesloaded/4.1.4/imagesloaded.pkgd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.4/TweenMax.min.js"></script>
    <script src="script.js"></script>

	</body>
</html>
